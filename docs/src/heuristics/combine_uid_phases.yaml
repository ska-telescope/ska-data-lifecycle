sequenceDiagram
    autonumber
    actor Admin as Storage Actor
    participant Controller as Heuristics Engine
    box rgb(200, 220, 255)
        participant Heuristic as Combine Phase Heuristic
    end
    participant DB as DLM Database

    
    Admin->>Controller: Retrieve data_item combined phase (OID)
    Controller->>Heuristic: Trigger Heuristic Execution
    
    Note over Heuristic, DB: Combine Phase Heuristic Execution
    Heuristic->>DB: Query OID (all UIDs)
    DB-->>Heuristic: Return OID, UIDs, uid_phases
    rect rgb(200, 210, 235)
        Heuristic->>Heuristic: Calculate actual_phase (uid_phases)
    end
    Heuristic->>Controller: actual_phase
    
    Controller->>Admin: Combined phase (actual_phase)