sequenceDiagram
    autonumber
    actor Admin as Storage Actor
    participant Controller as Heuristics Engine
    participant DB as DLM Database
    participant StorageManager as StorageManager
    participant Volume as Storage Volume A
    
    Admin->>Controller: Report Expired data_item (UID)
    
    rect rgb(200, 200, 200)
    Note over Controller, DB: Validation
    Controller->>DB: Query Expiration (UID)
    DB-->>Controller: Return Expiration (UID_expiration)

    alt UID_expiration < now()
        Controller-->>Admin: Error: Not yet expired!
    else UID_expiration >= now()
        DB-->>Controller: Verification Success
    end
    end

    rect rgb(130, 155, 130)
    Note over Controller, Volume: Execution
    Controller-->>Controller: Call Delete Heuristic (UID)
    Controller-->>Controller: Deletion Confirmed
    end

    Controller-->>Admin: Expiration Successful