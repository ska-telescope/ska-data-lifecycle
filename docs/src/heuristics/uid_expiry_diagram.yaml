sequenceDiagram
    autonumber
    actor Admin as Storage Actor
    participant Controller as Heuristics Engine
    participant Heuristic as UID Expiry Heuristics
    participant DB as DLM Database
    box rgb(200, 220, 255)
        participant Delete as Delete UID Heuristic
    end
    
    Admin->>Controller: Report Expired data_item (UID)
    Controller->>Heuristic: Trigger Heuristic Execution
    
    Note over Heuristic, Delete: UID Expiration Heuristics
    Heuristic->>DB: Query Expiration (UID)
    DB-->>Heuristic: Return Expiration (UID_expiration)

    alt UID_expiration < now() STATUS: ERROR
    else UID_expiration >= now()
        Heuristic->>Delete: Call Delete Heuristic (UID)
        Delete-->>Heuristic: STATUS
    end

    Heuristic-->>Controller: STATUS

    Controller-->>Admin: UID expiration status