%% The OID Phase enforce heuristic is checking the consistency between the OID phase
%% and combination of all UID phases and the target phase and acts accorning
%% to the result. It will call upon the Combine Phase, Increase and Decrease Phase
%% heuristics.
%% The main logic here is that the actual phase of an OID should be equal
%% to the logically combined phase of all UIDs and the actual phase also has
%% to satisfy the required target phase.
sequenceDiagram
    autonumber
    actor Admin as DLM Actor
    participant Controller as Heuristics Engine
    participant Heuristic as OID Phase Heuristics
    box rgb(200, 220, 255)
        participant Combine as Combine UID Phases
    end
    box rgb(200, 220, 255)
        participant Increase as Increase OID Phase
    end
    box rgb(200, 220, 255)
        participant Decrease as Decrease OID Phase
    end
    participant DB as DLM Database
    
    Admin->>Controller: Trigger Heuristics
    
    Controller->>Heuristic: Trigger Heuristic Execution
    Note over Heuristic, DB: OID Phase Enforce Heuristics
    Heuristic-->>DB: Query OID and UID phases
    DB-->>Heuristic: Return Phases (OID_phase, UID_phases, target_phase)
    rect rgb(200, 210, 235)
        Heuristic->>Combine: combine UID_phases [OID]
        Combine-->>Heuristic: ACTUAL_PHASE
    end

    alt target_phase = ACTUAL_PHASE and OID_phase != ACTUAL_PHASE
        Heuristic->>DB: Update OID_phase to ACTUAL_PHASE
    else target_phase < ACTUAL_PHASE
        rect rgb(200, 210, 235)
            Heuristic->>Increase: Call Increase OID_phase
        end
    else target_phase > ACTUAL_PHASE
        rect rgb(200, 210, 235)
            Heuristic->>Decrease: Call Decrease OID_phase
        end
    end
    Heuristic-->>Controller: Return STATUS
    Controller-->>Admin: OID Phase Heuristics Result: STATUS


