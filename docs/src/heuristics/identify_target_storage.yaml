sequenceDiagram
    title Identify Target Storage
    autonumber
    actor Admin as DLM Actor
    participant Controller as Heuristics Engine
    box rgb(200, 220, 255)
        participant Heuristic as Target Storage Heuristics
    end
    participant DB as DLM Database
    participant Combine as Combine Heuristics
    
    Admin->>Controller: Trigger Heuristics (oid, target_phase)
    
    Controller->>Heuristic: Trigger Heuristic Execution (oid, uid_phases, target_phase)
    Note over Heuristic, DB: Get storage_ids and phases NOT used for an instance of this OID
    Heuristic->>DB: Query storageIds
    DB-->>Heuristic: Return storageIds, storage_phase (not holding UIDs)
    Heuristic-->>Combine: combine UID_phases
    Combine-->>Heuristic: ACTUAL_PHASE

    %% initialise STATUS
    Heuristic-->>Heuristic: STATUS = None
    rect rgb(200, 210, 235)
        loop (storageIds, storage_phase)
        %% For now we just pick the first one, no fancy logic
        %% If there is no single storage providing enough increase
        %% the Heuristic will fail.
            break ACTUAL_PHASE+storage_phase >= target_phase
                Heuristic-->>Heuristic: STATUS = storage_id
            end
        end
    end
    alt: not(STATUS)
        Heuristic-->>Heuristic: STATUS = ERROR
    end
    Heuristic-->>Controller: Return STATUS
    Controller-->>Admin: OID Phase Heuristics Result: STATUS


