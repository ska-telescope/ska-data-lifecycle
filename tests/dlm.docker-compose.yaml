include:
  - path: services.docker-compose.yaml

services:
  dlm_migration:
    platform: linux/amd64
    image: dlm_migration
    container_name: dlm_migration
    build:
      context: ..
      dockerfile: tests/Dockerfile-dlm-compose
    entrypoint: uvicorn ska_dlm.dlm_migration.dlm_migration_requests:rest --host 0.0.0.0 --port 80
    environment:
      - VIRTUAL_HOST=dlm_migration.localhost
    ports:
      - 8004:80
    depends_on:
      - nginx-proxy
      - dlm_postgrest
      - dlm_rclone
      - dlm_gateway
    healthcheck:
      test: ["CMD-SHELL", "ska-dlm --help || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dlm_network

  dlm_storage:
    platform: linux/amd64
    image: dlm_storage
    container_name: dlm_storage
    build:
      context: ..
      dockerfile: tests/Dockerfile-dlm-compose
    environment:
      VIRTUAL_HOST: "dlm_storage.localhost"
      SSH_PUBLIC_KEY_PATH: "/dlm/.ssh/id_rsa.pub"
      LOCATION_CONFIG: "/home/ska-dlm/.dlm/location-config.json"
      STORAGE_CONFIG: "/home/ska-dlm/.dlm/storage-config.json"
    entrypoint: uvicorn ska_dlm.dlm_storage.dlm_storage_requests:rest --host 0.0.0.0 --port 80
    ports:
      - 8003:80
    volumes:
      # SKA Gitlab runner is unable to mount shared volumes on a DinD container
      # https://jira.skatelescope.org/browse/STS-1082
      #- ${CI_PROJECT_DIR:-..}/tests/storage-config.json:/mnt/storage-config.json
      #- ${CI_PROJECT_DIR:-..}/tests/location-config.json:/mnt/location-config.json
      - shared-tmpfs:/dlm
    depends_on:
      - nginx-proxy
      - dlm_gateway
      - dlm_postgrest
      - dlm_archive
    healthcheck:
      test: ["CMD-SHELL", "ska-dlm --help || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dlm_network

  dlm_request:
    image: dlm_request
    container_name: dlm_request
    platform: linux/amd64
    build:
      context: ..
      dockerfile: tests/Dockerfile-dlm-compose
    entrypoint: uvicorn ska_dlm.dlm_request.dlm_request_requests:rest --host 0.0.0.0 --port 80
    environment:
      - VIRTUAL_HOST=dlm_request.localhost
    ports:
      - 8002:80
    depends_on:
      - nginx-proxy
      - dlm_gateway
      - dlm_postgrest
      - dlm_rclone
    healthcheck:
      test: ["CMD-SHELL", "ska-dlm --help || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dlm_network

  dlm_ingest:
    platform: linux/amd64
    image: dlm_ingest
    container_name: dlm_ingest
    build:
      context: ..
      dockerfile: tests/Dockerfile-dlm-compose
    entrypoint: uvicorn ska_dlm.dlm_ingest.dlm_ingest_requests:rest --host 0.0.0.0 --port 80
    environment:
      - VIRTUAL_HOST=dlm_ingest.localhost
    ports:
      - 8001:80
    volumes:
      - shared-tmpfs:/data
    depends_on:
      - nginx-proxy
      - dlm_postgrest
      - dlm_rclone
      - dlm_gateway
    healthcheck:
      test: ["CMD-SHELL", "ska-dlm --help || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dlm_network

  dlm_heuristics:
    platform: linux/amd64
    image: dlm_heuristics
    container_name: dlm_heuristics
    build:
      context: ..
      dockerfile: tests/Dockerfile-heuristics
    environment:
      DLM_HEURISTIC_DATABASE_URL: "postgresql+asyncpg://ska_dlm_admin:password@dlm_db:5432/ska_dlm"
      DLM_HEURISTIC_POLL_INTERVAL: "10"
      VIRTUAL_HOST: "dlm_heuristics.localhost"
    depends_on:
      nginx-proxy:
        condition: service_healthy
      dlm_db:
        condition: service_healthy
      dlm_migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "ska-dlm --help || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dlm_network
