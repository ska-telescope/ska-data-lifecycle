apiVersion: v1
kind: Service
metadata:
  name: {{ include "ska-dlm.fullname" . }}-archive
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ska-dlm.archive.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: ssh
      port: 22
      targetPort: 2222
      protocol: TCP
  selector:
    component: {{ .Values.archive.component }}
    subsystem: {{ .Values.archive.subsystem }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ska-dlm.fullname" . }}-archive
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ska-dlm.archive.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.archive.replicas }}
  selector:
    matchLabels:
      component: {{ .Values.archive.component }}
      subsystem: {{ .Values.archive.subsystem }}
  template:
    metadata:
      labels:
        {{- include "ska-dlm.archive.labels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-rclone
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
          - |
            MAX_RETRIES=40
            DELAY=3
            RETRY_COUNT=0

            until wget -qO- --timeout=5 --tries=1 http://{{ include "ska-dlm.fullname" . }}-rclone:80/ >/dev/null 2>&1; do
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Waiting for rclone service '{{ include "ska-dlm.fullname" . }}-rclone'... attempt $RETRY_COUNT/$MAX_RETRIES"
              if [ "$RETRY_COUNT" -ge "$MAX_RETRIES" ]; then
                echo "Rclone service did not become ready after $MAX_RETRIES attempts"
                exit 1
              fi
              sleep $DELAY
            done
            echo "rclone is ready"
      containers:
      - name: archive
        image: {{ .Values.archive.image }}:{{ .Values.archive.version }}
        imagePullPolicy: {{ .Values.archive.imagePullPolicy }}
        env:
        - name: PUID
          value: "0"
        - name: PGID
          value: "0"
        - name: TZ
          value: "Etc/UTC"
        - name: SUDO_ACCESS
          value: "true"
        - name: PASSWORD_ACCESS
          value: "false"
        - name: PUBLIC_KEY_ACCESS
          value: "true"
        - name: PUBLIC_KEY_FILE
          value: "/dlm/.ssh/id_rsa.pub"
        volumeMounts:
          - name: shared-storage
            mountPath: /dlm
        lifecycle:
            postStart:
              exec:
                command:
                  - "/bin/bash"
                  - "-c"
                  - |
                    mkdir -p /root/.ssh
                    cat /dlm/.ssh/id_rsa.pub >> /root/.ssh/authorized_keys
                    chmod 700 /root/.ssh
                    chmod 600 /root/.ssh/authorized_keys
                    echo "PermitRootLogin yes" >> /etc/ssh/sshd_config
                    echo "PasswordAuthentication yes" >> /etc/ssh/sshd_config
                    echo "UsePAM yes" >> /etc/ssh/sshd_config
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: {{ .Values.global.sharedpvc.pvc.name }}