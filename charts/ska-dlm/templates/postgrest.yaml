{{- $rbac_name := printf "%s-postgrest" .Release.Name -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ska-dlm.fullname" . }}-postgrest
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ska-dlm.postgrest.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: tcp-postgrest
      port: 80
      targetPort: 3001
      protocol: TCP
  selector:
    component: {{ .Values.postgrest.component }}
    subsystem: {{ .Values.postgrest.subsystem }}
{{- if $.Values.postgresql.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ska-dlm.postgrest.db-auth-secret-name" $ }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "ska-dlm.postgrest.labels" $ | nindent 4 }}
type: Opaque
data:
  PGHOST: {{ include "ska-dlm.postgresql.name" $ | b64enc }}
  PGPORT: {{ "5432" | b64enc }}
  PGUSER: {{ $.Values.postgresql.auth.username | b64enc }}
  PGPASSWORD: {{ $.Values.postgresql.auth.password | b64enc }}
  PGDATABASE: {{ $.Values.postgresql.auth.database | b64enc }}
{{- else -}}
{{- with .Values.postgrest.db_auth_secret -}}
{{- if .create -}}
{{- if or (not .vault.mount) (not .vault.type) (not .vault.path) -}}
{{- fail (printf "No embedded PostgreSQL server enabled (postgresql.enabled=%s), but Vault values are missing (postgrest.db_auth_secret.vault.{mount,type,path})" ($.Values.postgresql.enabled | toString)) -}}
{{- end -}}
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  namespace: {{ $.Release.Namespace }}
  name: {{ include "ska-dlm.postgrest.db-auth-secret-name" $ }}-vaultstaticsecret
spec:
  mount: {{ .vault.mount }}
  type: {{ .vault.type }}
  path: {{ .vault.path }}
  destination:
    create: true
    name: {{ include "ska-dlm.postgrest.db-auth-secret-name" $ }}
    transformation:
      excludeRaw: true
{{- end -}}
{{- end -}}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ska-dlm.fullname" . }}-postgrest
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ska-dlm.postgrest.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.postgrest.replicas }}
  selector:
    matchLabels:
      component: {{ .Values.postgrest.component }}
      subsystem: {{ .Values.postgrest.subsystem }}
  template:
    metadata:
      labels:
        {{- include "ska-dlm.postgrest.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ printf "%s-postgrest" .Release.Name }}
      initContainers:
        - name: wait-for-postgres # works for either local or external PostgreSQL
          image: postgres:17.4
          command:
            - sh
            - -c
            - |
              MAX_RETRIES=40
              RETRY_COUNT=0
              DELAY=3

              until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
                if pg_isready -h "$PGHOST" -p "${PGPORT:-5432}" -U "$PGUSER" -d "$PGDATABASE"; then
                  echo "PostgreSQL is reachable."
                  exit 0
                fi

                RETRY_COUNT=$((RETRY_COUNT + 1))
                echo "Attempt $RETRY_COUNT failed. Retrying in $DELAY seconds..."
                sleep $DELAY
              done
              echo "PostgreSQL not ready/reachable"
              exit 1
          env:
            {{- range $envvar_name := tuple "PGUSER" "PGPASSWORD" "PGHOST" "PGDATABASE" }}
            - name: {{ $envvar_name }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "ska-dlm.postgrest.db-auth-secret-name" $ }}
                  key: {{ $envvar_name }}
            {{- end }}
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "ska-dlm.postgrest.db-auth-secret-name" $ }}
                  key: PGPORT
                  optional: true

        {{- if (index $.Values "ska-db-migrations" "runMigrations") }}
        - name: wait-for-db-migrations
          image: rancher/shell:v0.7.1-rc.1
          command:
            - sh
            - -c
            - |
              set -eu

              JOB_NAME="{{ include "ska-dlm.db-migrations.name" . }}"
              NAMESPACE="{{ .Release.Namespace }}"

              echo "Looking for migrations Job: ${JOB_NAME} in namespace ${NAMESPACE}"
              kubectl get job "$JOB_NAME" -n "$NAMESPACE" -o wide

              echo "Waiting for migrations Job ${JOB_NAME} to complete..."

              while true; do
                SUCCEEDED="$(kubectl get job "$JOB_NAME" -n "$NAMESPACE" -o jsonpath='{.status.succeeded}')"
                FAILED="$(kubectl get job "$JOB_NAME" -n "$NAMESPACE" -o jsonpath='{.status.failed}')"

                if [ "$SUCCEEDED" = "1" ]; then
                  echo "Migrations Job completed successfully."
                  break
                fi

                if [ -n "$FAILED" ] && [ "$FAILED" != "0" ]; then
                  echo "Migrations Job failed."
                  exit 1
                fi

                echo "Waiting for migrations Job ${JOB_NAME} to complete..."
                sleep 2
              done
        {{- end }}

        - name: wait-for-data-item-table
          image: postgres:17.4
          command:
            - sh
            - -c
            - |
              echo "Checking if dlm.data_item exists..."

              until PGPASSWORD="$PGPASSWORD" psql \
                -h "$PGHOST" \
                -p "${PGPORT:-5432}" \
                -U "$PGUSER" \
                -d "$PGDATABASE" \
                -tAc "SELECT 1 FROM information_schema.tables WHERE table_schema='dlm' AND table_name='data_item'" | grep -q 1; do
                sleep 2
              done

              echo "dlm.data_item table exists."
          env:
            {{- range $envvar_name := tuple "PGUSER" "PGPASSWORD" "PGHOST" "PGDATABASE" }}
            - name: {{ $envvar_name }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "ska-dlm.postgrest.db-auth-secret-name" $ }}
                  key: {{ $envvar_name }}
            {{- end }}
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "ska-dlm.postgrest.db-auth-secret-name" $ }}
                  key: PGPORT
                  optional: true
      containers:
        - name: postgrest
          image: {{ .Values.postgrest.image }}:{{ .Values.postgrest.version }}
          imagePullPolicy: {{ .Values.postgrest.imagePullPolicy }}
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            {{- range $envvar_name := tuple "PGUSER" "PGPASSWORD" "PGHOST" "PGPORT" "PGDATABASE" }}
            - name: {{ $envvar_name }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "ska-dlm.postgrest.db-auth-secret-name" $ }}
                  key: {{ $envvar_name }}
                  optional: false
            {{- end }}
            - name: PGRST_DB_URI
              value: "postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/$(PGDATABASE)"
            {{- $env := dict
              "PGRST_SERVER_PORT" "3001"
              "PGRST_DB_ANON_ROLE" .Values.postgrest.db_anon_role
              "PGRST_DB_POOL" .Values.postgrest.db_pool
              "PGRST_SERVER_HOST" .Values.postgrest.server_host
              "PGRST_SECRET_IS_BASE64" .Values.postgrest.secret_is_base64
              "PGRST_MAX_ROWS" .Values.postgrest.max_rows
              "PGRST_PRE_REQUEST" .Values.postgrest.pre_request
              "PGRST_ROLE_CLAIM_KEY" .Values.postgrest.role_claim_key
              "PGRST_DB_SCHEMA" .Values.postgrest.db_schema
              "PGRST_LOG_LEVEL" .Values.postgrest.log_level
            }}
            {{- range $envvar_name, $value := $env }}
            {{- if $value }}
            - name: {{ $envvar_name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $rbac_name }}
  namespace: {{ .Release.Namespace }}
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ $rbac_name }}
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ $rbac_name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ $rbac_name }}
  apiGroup: rbac.authorization.k8s.io
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ $rbac_name }}
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
