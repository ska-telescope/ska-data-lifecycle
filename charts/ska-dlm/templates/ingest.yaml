apiVersion: v1
kind: Service
metadata:
  name: {{ include "ska-dlm.fullname" . }}-ingest
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ska-dlm.ingest.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  selector:
    component: {{ .Values.ingest.component }}
    subsystem: {{ .Values.ingest.subsystem }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ska-dlm.fullname" . }}-ingest
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ska-dlm.ingest.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ingest.replicas }}
  selector:
    matchLabels:
      component: {{ .Values.ingest.component }}
      subsystem: {{ .Values.ingest.subsystem }}
  template:
    metadata:
      labels:
        {{- include "ska-dlm.ingest.labels" . | nindent 8 }}
    spec:
      containers:
      - name: ingest
        image: {{ .Values.ingest.image}}:{{ .Values.ingest.version }}
        imagePullPolicy: {{ .Values.ingest.imagePullPolicy }}
        command:
        - uvicorn
        - ska_dlm.dlm_ingest.dlm_ingest_requests:rest
        - --host
        - "0.0.0.0"
        - --port
        - "80"
        ports:
        - containerPort: 80
          name: http-port
        readinessProbe:
          tcpSocket:
            port: http-port
          periodSeconds: 5
          initialDelaySeconds: 5
        livenessProbe:
          tcpSocket:
            port: http-port
          periodSeconds: 5
          initialDelaySeconds: 5
        volumeMounts:
        - name: dlm-configmap
          mountPath: "/home/ska-dlm/.dlm"
          readOnly: true
      volumes:
      - name: dlm-configmap
        configMap:
          name: {{ include "ska-dlm.fullname" . }}-configmap
