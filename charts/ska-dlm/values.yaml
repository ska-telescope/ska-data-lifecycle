# ------------------------------------------------
# Default Helm configuration for ska-dlm server
# ------------------------------------------------

# ------ Global configuration (shared across components / subcharts) ------
global:
  ingress:
    enabled: false
    domainName: "sdhp.stfc.skao.int"  # required for whitelisting redirects
  development: true  # true for local deployment (to trigger gateway & keycloak)
  storageClass: "localdisk"  # existing storage class

  sharedpvc:
    # Shared PVC that can be mounted by multiple pods.
    # Default behaviour assumes the shared PVC is pre-provisioned (e.g. by CI/cluster tooling),
    # to avoid Helm upgrade failures due to immutable PVC fields.
    pv:
      create: false  # PV is cluster-scoped; do not create via Helm by default
      name: shared
      storageSize: 2Gi
      storageClassName: ""  # empty string => no StorageClass (static PV)

    pvc:
      name: shared
      # Default false – assume the shared PVC is pre-created (e.g. by CI/cluster tooling).
      # Set true only for first-time installs into a fresh namespace.
      create: false
      storageSize: 2Gi
      storageClassName: ""  # empty string => no StorageClass (static PVC)

# ------ Chart metadata / naming ------
system: dlm
nameOverride: ""
fullnameOverride: ""


# ------ Core DLM services and API ------

ingest:
  component: ingest
  subsystem: data-lifecycle-management
  image: artefact.skao.int/ska-data-lifecycle
  version: "2.0.0"
  imagePullPolicy: Always
  replicas: 1

storage:
  component: storage
  subsystem: data-lifecycle-management
  image: artefact.skao.int/ska-data-lifecycle
  version: "2.0.0"
  imagePullPolicy: Always
  replicas: 1

  locations: # Location endpoints (can list multiple)

  endpointSecretName: ""
  endpoints: # Storage endpoints (can list multiple)

migration:
  component: migration
  subsystem: data-lifecycle-management
  image: artefact.skao.int/ska-data-lifecycle
  version: "2.0.0"
  imagePullPolicy: Always
  replicas: 1

request:
  component: request
  subsystem: data-lifecycle-management
  image: artefact.skao.int/ska-data-lifecycle
  version: "2.0.0"
  imagePullPolicy: Always
  replicas: 1

postgrest:
  component: postgrest
  subsystem: data-lifecycle-management
  image: postgrest/postgrest
  version: "v13.0.7"
  imagePullPolicy: Always
  replicas: 1
  db_schema: dlm
  db_anon_role: ska_dlm_admin
  db_pool: 10
  server_host: '*4'
  secret_is_base64: false
  max_rows: ""
  pre_request: ""
  role_claim_key: '.role'
  log_level: info

  # PostgREST's auth details against PostgreSQL come from a Secret, which can be:
  # * Given to us by name (via ska-db-migrations.dbCredentialsSecretName), or
  # * Created via:
  #   * VSO, or
  #   * Automatically from the postgresql.auth section
  db_auth_secret:
    create: true  # true for local DB (postgresql.enabled=true)
    vault:
      enabled: false
      path: ""
      mount: ""
      type: "kv-v2"


heuristics:
  component: heuristics
  subsystem: data-lifecycle-management
  image: registry.gitlab.com/ska-telescope/ska-data-lifecycle/ska-data-lifecycle
  version: "2.0.0"
  imagePullPolicy: Always
  replicas: 1

ska-db-migrations:
  runMigrations: true
  engine: liquibase
  dbCredentialsSecretName: "{{ .Release.Name }}-ska-dlm-postgrest-secret"
  configMapName: "ska-dlm-db-migrations-{{ .Release.Name }}"
  liquibase:
    contextFilter: "create-db,create-schema" # "default" or a combination of "create-roles,create-db,create-schema"
    changelogFile: changelog.yaml
    ttlSecondsAfterFinished: 300

# ------ Database options ------

postgresql:
  enabled: true  # whether to deploy a local 'test' DB instead of connecting to an existing DB

  auth:
  # Used for local PostgreSQL bootstrap when postgresql.enabled=true
    username: ska_dlm_admin
    password: password
    database: dlm

  primary:
    containerSecurityContext:
      readOnlyRootFilesystem: false
    persistence:
      enabled: false
    podLabels:
      component: postgresql
      subsystem: data-lifecycle-management
    networkPolicy:
      enabled: false


# ------ Supporting infrastructure ------

rclone:
  component: rclone
  subsystem: data-lifecycle-management
  image: registry.gitlab.com/ska-telescope/ska-data-lifecycle/ska-data-lifecycle-rclone
  version: 2.0.0
  imagePullPolicy: Always
  replicas: 1
  secret:
    enabled: false
    name: ""
    mountPoint: "/secrets/"
    ssl_key_name: ""
    ssl_cert_name: ""
    vault:
      enabled: false
      mount: ""
      type: kv-v2
      path: ""

gateway:
  enabled: false  # true if you need AAA for DLM
  component: gateway
  subsystem: data-lifecycle-management
  image: registry.gitlab.com/ska-telescope/ska-data-lifecycle/ska-data-lifecycle-test-gateway
  version: "2.0.0"
  imagePullPolicy: Always
  replicas: 1
  secret:
    name: ""  # supply if gateway.enabled=true

keycloak:
  enabled: true  # false for production
  component: keycloak
  subsystem: data-lifecycle-management
  image: registry.gitlab.com/ska-telescope/ska-data-lifecycle/ska-data-lifecycle-test-keycloak
  version: "2.0.0"
  imagePullPolicy: Always
  replicas: 1
  use_https: true


# ------ Optional utilities ------

pgweb:  # see https://github.com/ectobit/charts/tree/main/pgweb
  enabled: false  # enable web IDE access to Postgres
  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /$2
    hosts:
    - paths:
      - path: /pgweb(/|$)(.*)
        pathType: ImplementationSpecific

benchmark:
  enabled: false  # false for regular deployment. Set to true to run the benchmarking pod (see scripts/README.md)
  component: benchmark
  subsystem: data-lifecycle-management
  image: registry.gitlab.com/ska-telescope/ska-data-lifecycle/ska-data-lifecycle-benchmark
  version: "2.0.0"
  imagePullPolicy: Always
  name: register  # register or migrate
  config:
    host:
    token:
    sourceFile:
    mountPath:

# ------ Auxiliary utility images ------
kubectl:
  image: rancher/kubectl
  version: "v1.28.15-amd64"
  imagePullPolicy: Always